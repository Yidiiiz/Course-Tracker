<svg width="800" height="232" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 232">

  <!-- Page background -->
  <rect width="800" height="232" fill="#0d0d0d"/>

  <!-- Drop shadow behind panel -->
  <rect x="163" y="21" width="480" height="196" rx="3" fill="#000" opacity="0.45"/>

  <!-- Panel outer border: 1px, BORDER #333333 -->
  <rect x="160" y="18" width="480" height="196" rx="2" fill="#333333"/>

  <!-- Panel body: BG #111111 -->
  <rect x="161" y="19" width="478" height="194" rx="1" fill="#111111"/>

  <!-- ═══ HEADER: SURFACE #1c1c1c, HDR_H=44 ═══ -->
  <!-- Rounded top, flat bottom (rounded rect then cover bottom corners) -->
  <rect x="161" y="19" width="478" height="44" rx="1" fill="#1c1c1c"/>

  <!-- Header bottom divider: DIVIDER #1f1f1f -->
  <rect x="161" y="63" width="478" height="1" fill="#1f1f1f"/>

  <!--
    Status dot canvas (16×16):
      placed at relx=0, rely=0.5, x=14, anchor="w" inside the 44px header
      left edge  = panel_left + 14  = 175
      center_x   = 175 + 8         = 183
      center_y   = panel_top + 22  = 41
    Backing oval(0,0,15,15) → r≈7.5; inner oval(3,3,12,12) → r≈4.5
    Showing green (seats open)
  -->
  <circle cx="183" cy="41" r="7" fill="#141414"/>
  <circle cx="183" cy="41" r="4" fill="#1a5e33"/>

  <!--
    Title label: x=38 from panel_left, rely=0.5
    font: Segoe UI Semibold 10 → ~13px SVG
    baseline ≈ center_y + 4  = 45
  -->
  <text x="199" y="45"
    font-family="'Segoe UI Semibold','Segoe UI',system-ui,sans-serif"
    font-size="13" font-weight="600" fill="#ececec">UMD Course Tracker</text>

  <!--
    × close button: relx=1, x=-6, anchor=e → right edge at 640-6=634
    font: Segoe UI 15 → ~20px SVG
  -->
  <text x="632" y="47"
    font-family="'Segoe UI',sans-serif"
    font-size="18" fill="#3e3e3e" text-anchor="end">×</text>

  <!--
    — minimize button: relx=1, x=-52, anchor=e → right edge at 640-52=588
    font: Segoe UI Semibold 10 → ~13px SVG
  -->
  <text x="586" y="44"
    font-family="'Segoe UI Semibold','Segoe UI',sans-serif"
    font-size="11" fill="#3e3e3e" text-anchor="end">—</text>

  <!-- ═══ BODY: padx=14, pady=(4,0) ═══ -->
  <!--
    body inner x: 161+14=175 … 161+478-14=625
    body top:     63 (divider) + 1 + 4 (pady) = 68

    section_divider("Courses") row pady=(10,4):
      row_top       = 68 + 10 = 78
      "COURSES" label 7pt bold SUB #6a6a6a → ~9px SVG
      label baseline = 78 + 9  = 87
      rule_y        = 84  (vertically centered in the row using pady=4 inside Frame)
      row_bottom    = 87 + 4   = 91  → canvas starts at 91
  -->
  <text x="175" y="87"
    font-family="'Segoe UI',system-ui,sans-serif"
    font-size="9" font-weight="700" fill="#3e3e3e" letter-spacing="0.6">COURSES</text>
  <rect x="220" y="83" width="405" height="1" fill="#1f1f1f"/>

  <!-- ═══ CARD 1: y=91, h=80 (CARD_H), x=175, w=450 ═══ -->
  <!-- CARD_BG = SURFACE = #1c1c1c -->
  <rect x="175" y="91" width="450" height="80" fill="#1c1c1c"/>

  <!--
    Left info block: padx=12 → content left edge at 175+12=187
    content.place(relx=0, rely=0.5, anchor="w") → vertical center at 91+40=131
    Block: name_row (Semibold 10 ≈ 13px) + 2px gap + term (Micro 8 ≈ 10px) = ~25px total
    Block top at 131 - 12 = 119
    Name baseline: 119+13 = 132
    Term baseline: 119+13+2+10 = 144
  -->
  <text x="187" y="131"
    font-family="'Segoe UI Semibold','Segoe UI',sans-serif"
    font-size="12" font-weight="600" fill="#ececec">CMSC351</text>
  <text x="187" y="143"
    font-family="'Segoe UI',sans-serif"
    font-size="9" fill="#4a4a4a">Fall 2026</text>

  <!--
    Right status block:
      RIGHT_W=185, card right edge=625, padx=(0,8) → right frame right at 625-8=617
      rc.place(relx=0, rely=0.5) → vertical center at 131
      top_row packed anchor=e, padx=(0,22) → top_row right edge at 617-22=595
      dc(16×16) packed side=right, padx=(0,6) → dc right at 595-6=589, center_x=581, center_y≈128
      seats_lbl packed side=right, padx=(4,4) → right edge at 589-16-4=569, text-anchor end at 569
  -->
  <circle cx="581" cy="128" r="7" fill="#141414"/>
  <circle cx="581" cy="128" r="4" fill="#1a5e33"/>
  <text x="569" y="132"
    font-family="'Segoe UI',sans-serif"
    font-size="9" fill="#208f49" text-anchor="end">3 seats open</text>

  <!-- ═══ CARD 2: y=175 (91+80+4 gap), h=80 — clipped by panel bottom ═══ -->
  <rect x="175" y="175" width="450" height="38" fill="#1c1c1c"/>

  <!--
    Card 2 content centered at 175+40=215 (but we only show partial card)
    Showing names near top of visible area
    Name baseline: ~210, term baseline: ~222 (partially visible)
  -->
  <text x="187" y="208"
    font-family="'Segoe UI Semibold','Segoe UI',sans-serif"
    font-size="12" font-weight="600" fill="#ececec">MATH241</text>
  <text x="255" y="208"
    font-family="'Segoe UI',sans-serif"
    font-size="10" fill="#333333">  ·  0101</text>

  <!-- Card 2 right: closed/red -->
  <!-- DANGER_D = blend(#ef4444, #141414, 0.42) ≈ #702828 -->
  <!-- DANGER_G = blend(#ef4444, #1c1c1c, 0.68) ≈ #ab3737 -->
  <circle cx="581" cy="205" r="7" fill="#141414"/>
  <circle cx="581" cy="205" r="4" fill="#702828"/>
  <text x="569" y="209"
    font-family="'Segoe UI',sans-serif"
    font-size="9" fill="#6b3a3a" text-anchor="end">Full</text>

  <!-- Fade-out at panel bottom so the cropped card looks intentional -->
  <defs>
    <linearGradient id="fadeOut" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d0d0d" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="161" y="196" width="478" height="17" fill="url(#fadeOut)"/>

</svg>

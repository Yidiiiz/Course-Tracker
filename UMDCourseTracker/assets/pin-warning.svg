<svg width="800" height="96" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 96">
  <!-- Card surface -->
  <rect width="800" height="96" rx="2" fill="#1c1c1c"/>
  <rect width="800" height="96" rx="2" fill="none" stroke="#333333" stroke-width="1"/>

  <!-- Left yellow accent bar -->
  <rect x="0" y="0" width="3" height="96" fill="#f59e0b" rx="1"/>

  <!-- Warning dot: backing -->
  <circle cx="26" cy="48" r="9" fill="#141414"/>
  <!-- Warning dot: WARN_D ≈ blend(#f59e0b, #141414, 0.42) -->
  <circle cx="26" cy="48" r="5" fill="#724e10"/>

  <!-- Title -->
  <text x="48" y="38"
    font-family="'Segoe UI Semibold','Segoe UI',system-ui,sans-serif"
    font-size="13" font-weight="600" fill="#ececec">
    Pin the tray icon to your taskbar after launching
  </text>

  <!-- Windows 11 instruction -->
  <text x="48" y="58"
    font-family="'Segoe UI',system-ui,sans-serif"
    font-size="11" fill="#5a5a5a">
    Windows 11 — drag the dot icon out of the
    <tspan font-family="'Segoe UI Semibold','Segoe UI',sans-serif" fill="#444444">∧</tspan>
    overflow area onto your taskbar
  </text>

  <!-- Windows 10 instruction -->
  <text x="48" y="76"
    font-family="'Segoe UI',system-ui,sans-serif"
    font-size="11" fill="#5a5a5a">
    Windows 10 — right-click taskbar →
    <tspan font-family="'Segoe UI',sans-serif" fill="#444444">Taskbar settings</tspan>
    → Select which icons appear → enable
    <tspan font-family="'Segoe UI Semibold','Segoe UI',sans-serif" fill="#444444">UMD Course Tracker</tspan>
  </text>
</svg>
